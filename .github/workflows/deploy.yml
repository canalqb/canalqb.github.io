name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Tools
        run: npm install -g html-minifier-terser terser

      - name: Inject Supabase Secrets
        run: |
          mkdir -p js
          cat > js/secrets-config.js << EOF
          window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_KEY = '${{ secrets.SUPABASE_KEY }}';
          console.log('🔑 Supabase Secrets Injected');
          EOF
          
          # Suporte para a tag de carregamento no HTML
          sed -i '/<!-- GitHub Secrets Loader - PARA PRODUÇÃO -->/a\  <script src="js/secrets-config.js"></script>' index.html

      - name: Minify Assets
        run: |
          # 🚀 CORREÇÃO: Não minifica arquivos JS críticos para produção
          # Minify apenas CSS e HTML
          
          # Minify HTML (Safe way)
          html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js false \
            index.html > index.min.html
          mv index.min.html index.html

      - name: Prepare Dist
        run: |
          mkdir dist
          # Copia apenas o necessário para produção
          cp -r css js paginas regras index.html ads.txt favicon.ico canalqb.ico robots.txt sitemap.xml .nojekyll dist/ 2>/dev/null || true
          # Copia arquivos IndexNow para a build
          cp indexnow.txt dist/
          cp 401d492e65fa47d3b34a0d4aaf092636.txt dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
