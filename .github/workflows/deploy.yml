name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Pega o código do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Configura Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3️⃣ Instala ferramentas de minificação
      - name: Install Tools
        run: npm install -g html-minifier-terser terser

      # 4️⃣ Injeta os secrets do Supabase
      - name: Inject Supabase Secrets
        run: |
          mkdir -p js
          cat > js/secrets-config.js << EOF
          window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_KEY = '${{ secrets.SUPABASE_KEY }}';
          console.log('🔑 Supabase Secrets Injected');
          EOF
          
          sed -i '/<!-- GitHub Secrets Loader - PARA PRODUÇÃO -->/a\  <script src="js/secrets-config.js"></script>' index.html

      # 5️⃣ Minifica HTML e CSS
      - name: Minify HTML and CSS
        run: |
          html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js false \
            index.html > index.min.html
          mv index.min.html index.html

      # 6️⃣ Prepara pasta dist para deploy
      - name: Prepare Dist
        run: |
          mkdir dist
          cp -r css js paginas regras examples index.html ads.txt favicon.ico canalqb.ico robots.txt sitemap.xml .nojekyll tiktokrRJTPPZZNWru5GcCtxpYZCrYh4A82OaC.txt dist/ 2>/dev/null || true
          # Garantir que arquivos IndexNow estejam incluídos
          cp paginas/indexnow.txt dist/
          cp paginas/401d492e65fa47d3b34a0d4aaf092636.txt dist/

      # 7️⃣ Envia artefato para o GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 8️⃣ Faz o deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 9️⃣ Envia URLs para IndexNow automaticamente
      - name: Submit URLs to IndexNow
        run: |
          INDEXNOW_KEY=${{ secrets.INDEXNOW_KEY }}
          DOMAIN="https://puzzlebtc.canalqb.com.br"

          # Lista de URLs a enviar
          URLS=(
            "$DOMAIN/"
            "$DOMAIN/index.html"
            "$DOMAIN/indexnow.txt"
            "$DOMAIN/401d492e65fa47d3b34a0d4aaf092636.txt"
            "$DOMAIN/tiktokrRJTPPZZNWru5GcCtxpYZCrYh4A82OaC.txt"
            "$DOMAIN/tiktokf67su8HbnwXcIXJ3UOrtD6vzaoU6rCc7.txt"
          )

          echo "🔗 Enviando URLs para IndexNow..."
          for url in "${URLS[@]}"; do
            curl -s -X POST "https://api.indexnow.org/indexnow?url=$url&key=$INDEXNOW_KEY" -o /dev/null
            echo "✅ Enviado: $url"
          done
