<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Conexão Vertical</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card bg-secondary text-white">
                    <div class="card-header bg-success">
                        <h3 class="text-center">🧪 Teste Conexão Tabela Vertical</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <button class="btn btn-primary w-100" onclick="testConnection()">
                                <i class="fas fa-plug"></i> Testar Conexão com Tabela
                            </button>
                        </div>
                        
                        <div class="mb-3">
                            <button class="btn btn-success w-100" onclick="testSaveProgress()">
                                <i class="fas fa-save"></i> Testar Salvamento
                            </button>
                        </div>
                        
                        <div class="mb-3">
                            <button class="btn btn-info w-100" onclick="testLoadProgress()">
                                <i class="fas fa-download"></i> Testar Carregamento
                            </button>
                        </div>

                        <div id="results" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/vertical-progress-manager.js"></script>
    <script>
        const supabaseUrl = 'https://dhpzusdynwpnsejnlzvf.supabase.co';
    const supabaseKey = 'sb_publishable_ZOpNfIGoHpzmx9h53xQSWw_0bf4_xb2';

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const alertClass = type === 'success' ? 'alert-success' : 
                              type === 'error' ? 'alert-danger' : 'alert-info';
            results.innerHTML += `<div class="alert ${alertClass}">${message}</div>`;
        }

        async function testConnection() {
            log('🔄 Testando conexão com tabela vertical_progress...');
            
            try {
                const response = await fetch(`${supabaseUrl}/rest/v1/vertical_progress?limit=1`, {
                    headers: {
                        'apikey': supabaseKey,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    log('✅ Conexão OK! Tabela vertical_progress acessível', 'success');
                    log(`📊 Registros encontrados: ${data.length}`);
                } else {
                    log('❌ Erro na conexão: ' + response.statusText, 'error');
                }
            } catch (error) {
                log('❌ Erro: ' + error.message, 'error');
            }
        }

        async function testSaveProgress() {
            log('🔄 Testando salvamento de progresso...');
            
            try {
                const manager = new VerticalProgressManager();
                manager.setCurrentPreset(73, '2000000000000000000', '3ffffffffffffffffffffff');
                
                await manager.saveVerticalProgress('2000000000000000001', 1000, 'effffffffffffffffffffff');
                
                log('✅ Salvamento testado com sucesso!', 'success');
                log('💾 Dados: 2^73, hex=2000000000000000001, count=1000');
            } catch (error) {
                log('❌ Erro no salvamento: ' + error.message, 'error');
            }
        }

        async function testLoadProgress() {
            log('🔄 Testando carregamento de progresso...');
            
            try {
                const manager = new VerticalProgressManager();
                const progress = await manager.getLastVerticalProgress(73);
                
                if (progress) {
                    log('✅ Progresso carregado com sucesso!', 'success');
                    log(`📊 Último hex: ${progress.last_hex_value}`);
                    log(`📊 Verificações: ${progress.last_verification_count}`);
                    log(`📊 Data: ${new Date(progress.updated_at).toLocaleString()}`);
                } else {
                    log('ℹ️ Nenhum progresso encontrado para 2^73');
                }
            } catch (error) {
                log('❌ Erro no carregamento: ' + error.message, 'error');
            }
        }

        // Teste automático ao carregar
        document.addEventListener('DOMContentLoaded', () => {
            log('🚀 Página de teste carregada');
            log('📋 Clique nos botões acima para testar cada funcionalidade');
        });
    </script>
</body>
</html>
