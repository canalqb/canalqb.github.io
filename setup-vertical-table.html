<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Tabela Vertical OVO IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card bg-secondary text-white">
                    <div class="card-header bg-primary">
                        <h3 class="text-center">🚀 Setup Tabela Vertical OVO IA</h3>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <h5>📋 Instruções:</h5>
                            <ol>
                                <li>Abra o painel do Supabase: <a href="https://ojcqpgnxfnmwvzscwqjl.supabase.co" target="_blank" class="text-warning">https://ojcqpgnxfnmwvzscwqjl.supabase.co</a></li>
                                <li>Vá para "SQL Editor"</li>
                                <li>Copie o código SQL abaixo</li>
                                <li>Cole e execute no SQL Editor</li>
                                <li>Volte e teste a funcionalidade vertical</li>
                            </ol>
                        </div>

                        <div class="mb-3">
                            <label for="sqlCode" class="form-label">Código SQL para criar tabela:</label>
                            <textarea id="sqlCode" class="form-control bg-dark text-white" rows="20" readonly></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-success" onclick="copySQL()">
                                <i class="fas fa-copy"></i> Copiar SQL
                            </button>
                            <button class="btn btn-primary" onclick="openSupabase()">
                                <i class="fas fa-external-link-alt"></i> Abrir Supabase
                            </button>
                            <button class="btn btn-warning" onclick="testConnection()">
                                <i class="fas fa-plug"></i> Testar Conexão
                            </button>
                        </div>

                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Carrega o código SQL
        async function loadSQL() {
            try {
                const response = await fetch('sql/create-vertical-table.sql');
                const sqlCode = await response.text();
                document.getElementById('sqlCode').value = sqlCode;
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<div class="alert alert-danger">❌ Erro ao carregar SQL: ' + error.message + '</div>';
            }
        }

        // Copia SQL para clipboard
        function copySQL() {
            const sqlCode = document.getElementById('sqlCode');
            sqlCode.select();
            document.execCommand('copy');
            
            document.getElementById('result').innerHTML = 
                '<div class="alert alert-success">✅ SQL copiado para área de transferência!</div>';
        }

        // Abre Supabase em nova aba
        function openSupabase() {
            window.open('https://dhpzusdynwpnsejnlzvf.supabase.co', '_blank');
        }

        // Testa conexão com Supabase
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="alert alert-info">🔄 Testando conexão...</div>';

            try {
                // Tenta buscar no ConfigManager se disponível, senão usa fixo
                let url = 'https://dhpzusdynwpnsejnlzvf.supabase.co';
                let key = 'sb_publishable_ZOpNfIGoHpzmx9h53xQSWw_0bf4_xb2';

                if (window.parent && window.parent.ConfigManager && window.parent.ConfigManager.isSupabaseAvailable()) {
                    const config = window.parent.ConfigManager.getSupabaseConfig();
                    url = config.url;
                    key = config.anonKey;
                }

                const response = await fetch(`${url}/rest/v1/`, {
                    headers: {
                        'apikey': key
                    }
                });

                if (response.ok) {
                    resultDiv.innerHTML = '<div class="alert alert-success">✅ Conexão com Supabase OK!</div>';
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-warning">⚠️ Conexão OK, mas verifique permissões (Status: ' + response.status + ')</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="alert alert-danger">❌ Erro de conexão: ' + error.message + '</div>';
            }
        }

        // Carrega SQL ao iniciar
        document.addEventListener('DOMContentLoaded', loadSQL);
    </script>
</body>
</html>
